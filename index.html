<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>스네이크 게임</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <section class="game-card">
      <header class="header">
        <h1>스네이크 게임</h1>
        <p>아이폰·아이패드·PC 브라우저에서 실행되는 HTML 게임</p>
      </header>

      <section class="status-row">
        <div class="status-box">
          <span>점수</span>
          <strong id="score">0</strong>
        </div>

        <div class="status-box">
          <span>최고점</span>
          <strong id="bestScore">0</strong>
        </div>

        <div class="status-box">
          <span>속도</span>
          <strong id="speedLevel">1</strong>
        </div>
      </section>

      <section class="board-wrap">
        <canvas id="gameCanvas" width="360" height="360"></canvas>
        <div id="message" class="message show">
          시작 버튼을 눌러주세요
        </div>
      </section>

      <section class="button-row">
        <button id="startBtn" type="button">시작</button>
        <button id="pauseBtn" type="button">일시정지</button>
        <button id="restartBtn" type="button">다시 시작</button>
      </section>

      <section class="touch-controls">
        <button type="button" data-direction="up">▲</button>
        <div class="middle-controls">
          <button type="button" data-direction="left">◀</button>
          <button type="button" data-direction="down">▼</button>
          <button type="button" data-direction="right">▶</button>
        </div>
      </section>

      <section class="guide">
        <p>PC 조작: 방향키</p>
        <p>모바일 조작: 버튼 또는 화면 스와이프</p>
      </section>
    </section>
  </main>

  <script src="./game.js"></script>
</body>
</html>
